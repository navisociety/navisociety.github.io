name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy navi-chat function
        continue-on-error: true
        run: |
          supabase functions deploy navi-chat \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-mini function
        continue-on-error: true
        run: |
          supabase functions deploy navi-mini \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-max function
        continue-on-error: true
        run: |
          supabase functions deploy navi-max \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-paypal function
        continue-on-error: true
        run: |
          supabase functions deploy navi-paypal \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-chats function
        continue-on-error: true
        run: |
          supabase functions deploy navi-chats \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-email function
        continue-on-error: true
        run: |
          supabase functions deploy navi-email \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-create function
        continue-on-error: true
        run: |
          supabase functions deploy navi-create \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-vision function
        continue-on-error: true
        run: |
          supabase functions deploy navi-vision \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # The Choice tool was removed (2026-07-16). This step deletes the old
      # navi-choice function from Supabase; it fails harmlessly once gone.
      - name: Delete retired navi-choice function
        continue-on-error: true
        run: |
          supabase functions delete navi-choice \
            --project-ref irssegzkvxyewuxgqpwi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
