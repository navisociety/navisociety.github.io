name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy navi-chat function
        run: |
          supabase functions deploy navi-chat \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-mini function
        run: |
          supabase functions deploy navi-mini \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-max function
        run: |
          supabase functions deploy navi-max \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-paypal function
        run: |
          supabase functions deploy navi-paypal \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Deploy navi-chats function
        run: |
          supabase functions deploy navi-chats \
            --project-ref irssegzkvxyewuxgqpwi \
            --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
